<!-- ใช้ section เพราะ Hero เป็นหมวดหลักของหน้าและเป็น target ของ nav link #home -->
<section
  id="home"
  class="relative isolate flex min-h-screen items-center overflow-hidden bg-dark pt-20"
  aria-labelledby="hero-title"
>
  <!-- ใช้ div เป็น visual background layer ไม่มีความหมายเชิงเนื้อหา จึงไม่ใช้ section/article -->
  <div
    class="absolute inset-0 -z-20 bg-[linear-gradient(rgba(255,255,255,.04)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,.04)_1px,transparent_1px)] bg-[size:42px_42px]"
  ></div>

  <!-- ใช้ div เป็น glow layer สำหรับตกแต่งภาพพื้นหลังเท่านั้น -->
  <div class="absolute left-1/2 top-1/3 -z-10 h-80 w-80 -translate-x-1/2 rounded-full bg-primary/20 blur-3xl"></div>

  <!-- ใช้ div เป็น layout wrapper เพื่อจำกัดความกว้างและจัด grid ของ hero content -->
  <div class="mx-auto grid w-full max-w-7xl items-center gap-10 px-5 py-20 sm:px-8 lg:grid-cols-[1.15fr_.85fr]">
    <!-- ใช้ div เป็นกลุ่ม layout ของข้อความ hero ไม่ใช่ semantic ใหม่ เพราะ section มี heading หลักอยู่แล้ว -->
    <div class="reveal">
      <p class="mb-5 inline-flex items-center gap-2 rounded-full border border-green-500/30 bg-green-500/10 px-4 py-2 font-mono text-sm text-green-300">
        <span class="h-2.5 w-2.5 rounded-full bg-green-400 shadow-[0_0_16px_rgba(74,222,128,.8)] animate-pulse"></span>
        Available for work
      </p>

      <p class="font-mono text-sm uppercase tracking-[0.25em] text-primary">Hello, I'm</p>

      <!-- ใช้ h1 เพราะนี่คือหัวข้อหลักที่สุดของหน้า portfolio -->
      <h1 id="hero-title" class="mt-4 max-w-4xl font-display text-5xl font-bold leading-tight text-white sm:text-6xl lg:text-7xl">
        {{ data.profile().name }}
      </h1>

      <!-- ใช้ p สำหรับ role เพราะเป็นข้อความอธิบายตัวตน ไม่ใช่ heading ใหม่ -->
      <p class="mt-5 min-h-9 font-display text-2xl font-semibold text-primary sm:text-3xl">
        {{ displayedRole() }}<span class="animate-pulse text-primary-light">|</span>
      </p>

      <p class="mt-6 max-w-2xl text-lg leading-8 text-neutral-400">
        I build modern web apps, AI tools, and automation systems that help businesses grow.
      </p>

      <!-- ใช้ div เป็น wrapper ของ CTA buttons เพื่อจัด flex/spacing เท่านั้น -->
      <div class="mt-9 flex flex-col gap-4 sm:flex-row">
        <button
          type="button"
          class="rounded-lg bg-primary px-6 py-3 font-semibold text-white shadow-glow transition hover:bg-primary-light"
          (click)="theme.scrollToSection('projects')"
        >
          View Projects
        </button>
        <button
          type="button"
          class="rounded-lg border border-primary px-6 py-3 font-semibold text-primary transition hover:bg-primary/10 hover:shadow-glow"
          (click)="theme.scrollToSection('contact')"
        >
          Contact Me
        </button>
      </div>
    </div>

    <!-- ใช้ aside เพราะเป็นส่วนประกอบข้างเคียงของ hero ที่เสริม brand/profile ไม่ใช่ content flow หลัก -->
    <aside class="reveal rounded-2xl border border-white/10 bg-white/[0.03] p-6 shadow-2xl backdrop-blur">
      <!-- ใช้ div เป็นกรอบภาพ/logo card เพื่อจัด visual composition -->
      <div class="grid aspect-[5/2] place-items-center rounded-xl border border-primary/20 bg-dark-card p-8">
        <img class="h-auto w-full max-w-md" [src]="data.profile().logoUrl" alt="ApoRaviz brand logo" />
      </div>
      <p class="mt-5 font-mono text-sm text-neutral-400">
        Angular 21 · Node 24 · AI Automation · Business Systems
      </p>
    </aside>
  </div>

  <!-- ใช้ button เพราะ scroll indicator เป็น action ในหน้า ไม่ใช่ link URL -->
  <button
    type="button"
    class="absolute bottom-8 left-1/2 hidden -translate-x-1/2 animate-bounce text-2xl text-primary md:block"
    aria-label="Scroll to about section"
    (click)="theme.scrollToSection('about')"
  >
    ↓
  </button>
</section>

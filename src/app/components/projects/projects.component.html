<!-- ใช้ section เพราะ Projects เป็นหมวดหลักของหน้าและเป็น target ของปุ่ม View Projects -->
<section id="projects" class="bg-dark py-24" aria-labelledby="projects-title">
  <div class="mx-auto max-w-7xl px-5 sm:px-8">
    <header class="reveal text-center">
      <p class="font-mono text-sm uppercase tracking-[0.25em] text-primary">Selected Work</p>
      <h2 id="projects-title" class="mt-3 font-display text-4xl font-bold text-white sm:text-5xl">
        <span class="text-primary">Projects</span>
      </h2>
      <div class="mx-auto mt-4 h-1 w-20 rounded-full bg-primary shadow-glow"></div>
    </header>

    <!-- ใช้ div เป็น responsive grid wrapper; ความหมายของแต่ละชิ้นอยู่ที่ article ด้านใน -->
    <div class="mt-12 grid gap-6 md:grid-cols-2 xl:grid-cols-3">
      @for (project of data.projects(); track project.id) {
        <!-- ใช้ article เพราะ project card เป็นงานหนึ่งชิ้นที่แยกอ่าน/แชร์ได้ -->
        <article class="reveal overflow-hidden rounded-xl border border-dark-border bg-dark-card transition duration-300 hover:scale-[1.02] hover:border-primary/70 hover:shadow-glow">
          <!-- ใช้ div เป็น image placeholder layer เพราะยังไม่มีรูปจริงของแต่ละโปรเจกต์ -->
          <div class="grid aspect-video place-items-center bg-gradient-to-br from-orange-900/40 via-dark-card to-dark">
            <p class="px-6 text-center font-display text-2xl font-bold text-white">{{ project.title }}</p>
          </div>

          <div class="p-6">
            <h3 class="font-display text-2xl font-semibold text-white">{{ project.title }}</h3>
            <p class="mt-3 min-h-14 leading-7 text-neutral-400">{{ project.description }}</p>

            <div class="mt-5 flex flex-wrap gap-2">
              @for (tech of project.tech; track tech) {
                <span class="rounded border border-dark-border bg-dark px-2 py-1 font-mono text-xs text-neutral-300">{{ tech }}</span>
              }
            </div>

            <!-- ใช้ div เป็น action row wrapper เพื่อจัดปุ่มสองแบบให้อยู่บรรทัดเดียวกัน -->
            <div class="mt-6 flex gap-3">
              <!-- ใช้ a เพราะ Live Demo/GitHub เป็น navigation ไป URL ของโปรเจกต์ -->
              <a class="rounded-lg border border-primary px-4 py-2 text-sm font-semibold text-primary transition hover:bg-primary/10" [href]="project.liveUrl">
                Live Demo
              </a>
              <a class="rounded-lg px-4 py-2 text-sm font-semibold text-neutral-300 transition hover:text-primary" [href]="project.githubUrl">
                GitHub
              </a>
            </div>
          </div>
        </article>
      }
    </div>
  </div>
</section>

<!-- ใช้ section เพราะ Services เป็นหมวดหลัก และ selector ตั้งเป็น app-services-section เพื่อไม่ชนกับชื่อ service class -->
<section id="services" class="bg-[#0d0d0d] py-24" aria-labelledby="services-title">
  <div class="mx-auto max-w-7xl px-5 sm:px-8">
    <header class="reveal text-center">
      <p class="font-mono text-sm uppercase tracking-[0.25em] text-primary">What I Build</p>
      <h2 id="services-title" class="mt-3 font-display text-4xl font-bold text-white sm:text-5xl">
        <span class="text-primary">Services</span>
      </h2>
      <div class="mx-auto mt-4 h-1 w-20 rounded-full bg-primary shadow-glow"></div>
    </header>

    <!-- ใช้ div เป็น grid wrapper สำหรับ responsive layout ของ service cards -->
    <div class="mt-12 grid gap-5 sm:grid-cols-2 lg:grid-cols-3">
      @for (service of data.services(); track service.title) {
        <!-- ใช้ article เพราะแต่ละ service เป็นรายการบริการที่มีหัวข้อและคำอธิบายครบในตัวเอง -->
        <article class="reveal rounded-2xl border border-white/10 bg-white/[0.03] p-6 backdrop-blur-sm transition hover:border-primary/60 hover:shadow-glow">
          <p class="text-4xl" aria-hidden="true">{{ service.icon }}</p>
          <h3 class="mt-5 font-display text-xl font-semibold text-white">{{ service.title }}</h3>
          <p class="mt-3 leading-7 text-neutral-400">{{ service.description }}</p>
        </article>
      }
    </div>
  </div>
</section>

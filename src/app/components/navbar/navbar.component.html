<nav
  class="sticky top-0 z-50 border-b border-white/10 bg-dark/75 transition-all duration-300 backdrop-blur-xl"
  [class.border-b]="theme.scrolled()"
  [class.border-primary/20]="theme.scrolled()"
  [class.shadow-glow]="theme.scrolled()"
>
  <div class="mx-auto flex h-20 max-w-7xl items-center justify-between px-5 sm:px-8">
    <a
      routerLink="/"
      class="flex items-center gap-3 rounded-xl border border-primary/20 bg-black/30 px-3 py-2 shadow-[inset_0_1px_0_rgba(255,255,255,.08)] transition hover:border-primary/50 hover:bg-primary/10"
      aria-label="Open home page"
      (click)="theme.closeMobileMenu()"
    >
      <img class="h-10 w-auto" [src]="data.profile().logoUrl" alt="ApoRaviz logo" />
    </a>

    <div class="hidden items-center gap-8 md:flex">
      @for (link of data.navLinks(); track link.id) {
        <a
          [attr.href]="'/#' + link.id"
          class="relative rounded-lg px-2 py-1 font-mono text-sm text-neutral-300 transition hover:bg-primary/10 hover:text-primary"
          [class.text-primary]="theme.activeSection() === link.id"
          [class.bg-primary/10]="theme.activeSection() === link.id"
          (click)="goToSection($event, link.id)"
        >
          {{ link.label }}
          @if (theme.activeSection() === link.id) {
            <span class="absolute -bottom-2 left-0 h-0.5 w-full rounded-full bg-primary shadow-glow"></span>
          }
        </a>
      }
      <a
        [href]="workspaceDocsUrl"
        target="_blank"
        rel="noreferrer"
        class="rounded-lg border border-primary/35 px-3 py-2 font-mono text-sm text-primary transition hover:bg-primary hover:text-white"
      >
        Learn Docs
      </a>
    </div>

    <button
      type="button"
      class="grid h-11 w-11 place-items-center rounded-lg border border-dark-border text-white transition hover:border-primary/50 hover:text-primary md:hidden"
      aria-label="Toggle navigation menu"
      (click)="theme.toggleMobileMenu()"
    >
      @if (theme.mobileMenuOpen()) {
        <span class="font-mono text-2xl leading-none">x</span>
      } @else {
        <span class="grid gap-1.5" aria-hidden="true">
          <span class="block h-0.5 w-5 rounded-full bg-current"></span>
          <span class="block h-0.5 w-5 rounded-full bg-current"></span>
          <span class="block h-0.5 w-5 rounded-full bg-current"></span>
        </span>
      }
    </button>
  </div>

  @if (theme.mobileMenuOpen()) {
    <div class="border-t border-dark-border bg-dark/95 px-5 py-5 backdrop-blur-xl md:hidden">
      <div class="mx-auto flex max-w-7xl flex-col gap-2">
        @for (link of data.navLinks(); track link.id) {
          <a
            [attr.href]="'/#' + link.id"
            class="rounded-lg px-4 py-3 text-left font-mono text-sm transition hover:bg-primary/10 hover:text-primary"
            [class.bg-primary/10]="theme.activeSection() === link.id"
            [class.text-primary]="theme.activeSection() === link.id"
            (click)="goToSection($event, link.id)"
          >
            {{ link.label }}
          </a>
        }
        <a
          [href]="workspaceDocsUrl"
          target="_blank"
          rel="noreferrer"
          class="rounded-lg border border-primary/35 px-4 py-3 text-left font-mono text-sm text-primary transition hover:bg-primary hover:text-white"
          (click)="theme.closeMobileMenu()"
        >
          Learn Docs
        </a>
      </div>
    </div>
  }
</nav>
